services:
  inkflow-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: inkflow
      POSTGRES_USER: inkflow
      POSTGRES_PASSWORD: ${INKFLOW_DB_PASSWORD:-inkflow_dev}
    ports:
      - "${INKFLOW_DB_PORT:-5434}:5432"
    volumes:
      - inkflow_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    command: >
      postgres
        -c tcp_keepalives_idle=60
        -c tcp_keepalives_interval=10
        -c tcp_keepalives_count=3
        -c statement_timeout=30000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkflow"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  inkflow_pgdata:
